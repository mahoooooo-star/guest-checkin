<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Check In</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jsQR/1.4.0/jsQR.min.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #111; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; font-family: sans-serif; }
    #flash { position: fixed; top: 0; left: 0; width: 100%; height: 100%; display: none; align-items: center; justify-content: center; flex-direction: column; z-index: 10; }
    #flash h1 { font-size: 2.5rem; color: white; text-align: center; padding: 1rem; }
    video { width: 100%; max-width: 400px; border-radius: 12px; }
    canvas { display: none; }
    #status { color: #aaa; margin-top: 1rem; font-size: 0.9rem; }
  </style>
</head>
<body>

  <video id="video" autoplay playsinline></video>
  <canvas id="canvas"></canvas>
  <p id="status">Scanning...</p>

  <div id="flash">
    <h1 id="flash-text"></h1>
  </div>

<script>
  const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbyp85dQw60YUFjpzIDIsZKOkCZIKYlTkaYjp70a1PmcMC-eqkYAQNs_GQTar04xQul8/exec";

  const video = document.getElementById("video");
  const canvas = document.getElementById("canvas");
  const ctx = canvas.getContext("2d");
  const flash = document.getElementById("flash");
  const flashText = document.getElementById("flash-text");
  const status = document.getElementById("status");

  let scanning = true;

  navigator.mediaDevices.getUserMedia({ video: { facingMode: "environment" } })
    .then(stream => { video.srcObject = stream; requestAnimationFrame(scan); });

  function scan() {
    if (video.readyState === video.HAVE_ENOUGH_DATA) {
      canvas.width = video.videoWidth;
      canvas.height = video.videoHeight;
      ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
      const imageData = ctx.getImageData(0, 0, canvas.width, canvas.height);
      const code = jsQR(imageData.data, canvas.width, canvas.height);

      if (code && scanning) {
        scanning = false;
        handleScan(code.data);
      }
    }
    requestAnimationFrame(scan);
  }

  async function handleScan(url) {
    status.textContent = "Processing...";
    try {
      const response = await fetch(url);
      const text = await response.text();
      const data = JSON.parse(text);

      if (data.status === "success") {
        showFlash("green", "✅ " + data.message);
      } else {
        showFlash("red", "❌ " + data.message);
      }
    } catch {
      showFlash("red", "❌ Error, try again");
    }
  }

  function showFlash(color, message) {
    flash.style.background = color === "green" ? "#16a34a" : "#dc2626";
    flash.style.display = "flex";
    flashText.textContent = message;

    setTimeout(() => {
      flash.style.display = "none";
      status.textContent = "Scanning...";
      scanning = true;
    }, 2000);
  }
</script>

</body>
</html>
